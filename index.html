<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySight | Ultimate Weather Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: linear-gradient(135deg,#0b1d33,#1e2a47,#2f3b5c);
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.2);
  --accent1:#38bdf8;
  --accent2:#6366f1;
  --text:#f1f5f9;
  --alert-severe:#f87171;
  --alert-warning:#facc15;
  --alert-info:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);scroll-behavior:smooth;min-height:100vh;}

header{
  background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 2rem; position:fixed; top:0; left:0; width:100%; z-index:999;
  flex-wrap:wrap;
}

.logo{
  font-size:2rem; font-weight:900;
  display:flex; align-items:center; gap:0.5rem; cursor:pointer; text-decoration:none;
}
.logo svg{width:32px; height:32px; transition:fill 0.2s; fill:#6366f1;}
.logo span{
  background: linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

nav{display:flex; flex-wrap:wrap; gap:1rem; margin-top:0.5rem;}
nav a{color:var(--text); text-decoration:none; font-weight:600; transition:0.3s;}
nav a:hover{color:var(--accent1);}

.search{padding:.5rem 1rem; border-radius:20px; border:none; outline:none; margin-top:0.5rem; max-width:200px;}

#scrollTop{
  position:fixed; bottom:20px; right:20px;
  background:var(--accent1); color:#fff; border:none;
  padding:0.5rem 0.8rem; border-radius:50%; font-size:1.3rem; cursor:pointer;
  display:none; z-index:999;
}

.dashboard{display:flex; flex-direction:column; gap:1rem; padding:6rem 1rem 1rem 1rem; max-width:1200px; margin:auto;}

.card{
  background:var(--glass); border:1px solid var(--border); border-radius:16px; padding:1rem;
  backdrop-filter:blur(12px); width:100%; transition:0.3s; opacity:1; transform:translateY(0);
  overflow-x:auto; -webkit-overflow-scrolling: touch;
}

.current{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
.temp{font-size:3rem; font-weight:700; cursor:pointer;}

.hourly{display:flex; gap:1rem; overflow-x:auto; padding-bottom:0.5rem; -webkit-overflow-scrolling: touch;}
.hour{min-width:80px; text-align:center; transition:0.2s; flex-shrink:0;}
.hour:hover{transform:scale(1.1);}

.week{display:flex; flex-direction:row; gap:1rem; overflow-x:auto; padding:0.5rem 0;}
.day{
  flex:0 0 auto; width:100px; background:rgba(255,255,255,0.05); border-radius:12px;
  padding:0.5rem; text-align:center; transition:0.2s; cursor:pointer;
}
.day:hover{background:rgba(56,189,248,0.2); transform:scale(1.05);}
.day p{margin:0.2rem 0; font-size:0.85rem;}

canvas{width:100% !important; height:200px !important; touch-action: pan-x pan-y;}

/* 24h Trends Enhancements */
.card#charts canvas{
  margin-top:1rem; border-radius:12px; background:rgba(255,255,255,0.05);
  padding:0.5rem;
}
.card#charts h3{margin-bottom:0.5rem;}
.chart-label{font-size:0.85rem; color:#f1f5f9; margin-top:0.2rem; text-align:center;}

#map{height:400px; border-radius:16px; width:100%; max-width:100%;}

.alert{padding:.5rem; border-radius:8rem; margin-bottom:.5rem; transition:0.2s; word-break:break-word;}
.alert-severe{background:var(--alert-severe);color:#000;}
.alert-warning{background:var(--alert-warning);color:#000;}
.alert-info{background:var(--alert-info);color:#000;}
.alert:hover{opacity:0.9;}

@media(max-width:900px){
  header{flex-direction:column; align-items:center;}
  .search{width:100%; max-width:250px;}
  .current{flex-direction:column; align-items:flex-start;}
  .temp{font-size:2.5rem;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="#top">
    <svg viewBox="0 0 24 24"><path d="M12 2C10.343 2 9 3.343 9 5s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zm0 16c-2.21 0-4 1.79-4 4h8c0-2.21-1.79-4-4-4z"/></svg>
    <span>SkySight</span>
  </a>
  <nav>
    <a href="#current">Current</a>
    <a href="#hourly-section">Hourly</a>
    <a href="#weekly">Weekly</a>
    <a href="#charts">Charts</a>
    <a href="#map-section">Map</a>
    <a href="#details">Details</a>
    <a href="#alerts">Alerts</a>
  </nav>
  <input id="search" class="search" placeholder="Search city...">
</header>

<button id="scrollTop">&#8679;</button>

<div id="top" class="dashboard">
  <div class="card current" id="current"><div><div id="location">Las Vegas, NV</div><div id="desc">Loading current...</div></div><div class="temp" id="temp">--°</div></div>
  <div class="card" id="hourly-section"><h3>Hourly Forecast</h3><div id="hourly" class="hourly">Loading hourly...</div></div>
  <div class="card" id="weekly"><h3>7-Day Forecast</h3><div class="week" id="weekly-forecast">Loading weekly...</div></div>
  <div class="card" id="charts"><h3>24h Trends</h3>
    <canvas id="tempChart"></canvas>
    <canvas id="windChart"></canvas>
    <canvas id="precipChart"></canvas>
  </div>
  <div class="card" id="map-section"><h3>Interactive Map with Radar</h3><div id="map"></div></div>
  <div class="card" id="details"><h3>Details</h3><div id="details-content">Loading details...</div></div>
  <div class="card" id="alerts"><h3>Weather Alerts</h3><div id="alerts-content">Loading alerts...</div></div>
</div>

<script>
// === GLOBALS ===
let lat=36.1699, lon=-115.1398, isFahrenheit=true;
const scrollBtn=document.getElementById("scrollTop");

// === SCROLL TOP ===
window.onscroll=()=>scrollBtn.style.display=(window.scrollY>150)?"block":"none";
scrollBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));

// === LOGO FLICKER ===
const logoLink=document.querySelector(".logo"), logoPath=document.querySelector(".logo svg path");
function flicker(){logoPath.setAttribute("fill","#f87171"); setTimeout(()=>logoPath.setAttribute("fill","#6366f1"),200);}
logoLink.addEventListener("mouseenter",flicker);

// === MAP SETUP & MAJOR CITIES ===
const map=L.map("map",{zoomControl:true,scrollWheelZoom:true}).setView([lat,lon],4);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ attribution:"© OpenStreetMap" }).addTo(map);
let markers=[];
function addMarker(lat, lon, popupText){
  const m = L.marker([lat, lon]).addTo(map).bindPopup(popupText);
  markers.push(m);
  return m;
}

// Preloaded major cities to avoid zoom errors
const majorCities=[
  {name:"New York, USA",lat:40.7128,lon:-74.006},
  {name:"Los Angeles, USA",lat:34.0522,lon:-118.2437},
  {name:"London, UK",lat:51.5074,lon:-0.1278},
  {name:"Paris, France",lat:48.8566,lon:2.3522},
  {name:"Tokyo, Japan",lat:35.6895,lon:139.6917},
  {name:"Sydney, Australia",lat:-33.8688,lon:151.2093},
  {name:"Las Vegas, USA",lat:36.1699,lon:-115.1398},
  {name:"Chicago, USA",lat:41.8781,lon:-87.6298},
  {name:"Miami, USA",lat:25.7617,lon:-80.1918},
  {name:"Toronto, Canada",lat:43.6532,lon:-79.3832}
];

let mainMarker = addMarker(lat, lon, "Las Vegas, NV");

// Radar animations (RainViewer)
let radarLayer;
function addRadar(){
  const now=Math.floor(Date.now()/1000/300)*300;
  if(radarLayer) map.removeLayer(radarLayer);
  radarLayer=L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/256/{z}/{x}/{y}/${now}/0_1.png`,{opacity:0.5}).addTo(map);
}
addRadar(); setInterval(addRadar,300000);
window.addEventListener("resize",()=>map.invalidateSize());

// === HELPERS ===
function cToF(c){return Math.round((c*9/5)+32);}
function getIcon(code){
  if(code===0)return"☀️";
  if([1,2,3].includes(code))return"⛅";
  if([45,48].includes(code))return"🌫️";
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code))return"🌧️";
  if([71,73,75,77,85,86].includes(code))return"❄️";
  if([95,96,99].includes(code))return"⛈️";
  return"❔";
}

// === FETCH FUNCTIONS === (unchanged)
async function fetchCurrent(){...} // same as before
async function fetchHourly(){...} // same as before
async function fetchWeekly(){...} // same as before
async function fetchAlerts(){...} // same as before

// === CHARTS (improved readability) ===
function renderCharts(d){
  const labels=d.hourly.time.slice(0,24).map(t=>t.split("T")[1]);
  const temps=d.hourly.temperature_2m.slice(0,24).map(t=>(isFahrenheit?cToF(t):t));
  const winds=d.hourly.windspeed_10m.slice(0,24); const prec=d.hourly.precipitation.slice(0,24);
  if(window.tempC) window.tempC.destroy();
  if(window.windC) window.windC.destroy();
  if(window.precC) window.precC.destroy();

  const chartOpts={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:14}}},tooltip:{bodyFont:{size:14},titleFont:{size:14}}},
    scales:{x:{ticks:{font:{size:12}}},y:{ticks:{font:{size:12}}}
  };

  window.tempC=new Chart(document.getElementById("tempChart").getContext("2d"),{type:"line",
    data:{labels,datasets:[{label:"Temp",data:temps,borderColor:"#38bdf8",backgroundColor:"rgba(56,189,248,0.2)",tension:0.4}]},
    options:chartOpts
  });
  window.windC=new Chart(document.getElementById("windChart").getContext("2d"),{type:"line",
    data:{labels,datasets:[{label:"Wind",data:winds,borderColor:"#facc15",backgroundColor:"rgba(250,204,21,0.2)",tension:0.4}]},
    options:chartOpts
  });
  window.precC=new Chart(document.getElementById("precipChart").getContext("2d"),{type:"bar",
    data:{labels,datasets:[{label:"Precip",data:prec,backgroundColor:"rgba(248,113,113,0.6)"}]},
    options:chartOpts
  });
}

// === SEARCH (preloaded cities) & MAP MULTIPLE LOCATIONS ===
document.getElementById("search").addEventListener("keypress", async e=>{
  if(e.key==="Enter"){
    const input=e.target.value.trim().toLowerCase();
    const city=majorCities.find(c=>c.name.toLowerCase().includes(input));
    if(city){
      lat=city.lat; lon=city.lon;
      document.getElementById("location").textContent=city.name;
      const m=addMarker(lat, lon, city.name);
      map.flyTo([lat, lon],6,{duration:1.2});
      loadAll();
    } else alert("City not available in preloaded list");
  }
});

// === TEMP TOGGLE ===
document.getElementById("temp").addEventListener("click",()=>{isFahrenheit=!isFahrenheit; loadAll();});

// === LOAD ALL ===
function loadAll(){fetchCurrent(); fetchHourly(); fetchWeekly(); fetchAlerts();}
loadAll();
setInterval(loadAll,600000);

// Map click to add marker without zoom warnings
map.on('click', e=>{
  lat = e.latlng.lat;
  lon = e.latlng.lng;
  const m = addMarker(lat, lon, `Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`);
  document.getElementById("location").textContent=`Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`;
  loadAll();
});
</script>
</body>
</html>
