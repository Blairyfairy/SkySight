<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySight | Ultimate Weather Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: linear-gradient(135deg,#0a1626,#0f1f3a,#1b2c4a);
  --glass: rgba(15,23,42,0.65);
  --glass-strong: rgba(15,23,42,0.9);
  --border: rgba(99,102,241,0.25);
  --accent1:#38bdf8;
  --accent2:#6366f1;
  --accent-soft: rgba(99,102,241,0.18);
  --text:#f1f5f9;
  --alert-severe:#f87171;
  --alert-warning:#facc15;
  --alert-info:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-dark);
  color:var(--text);
  scroll-behavior:smooth;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* === NEW: ATMOSPHERE FX === */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 30%, rgba(56,189,248,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(99,102,241,0.15), transparent 40%);
  animation:atmoMove 20s linear infinite;
}

@keyframes atmoMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(-40px,20px);}
  100%{transform:translate(0,0);}
}

/* HEADER (UNCHANGED EXACT LOOK) */
header{
  background: var(--glass-strong);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem 2rem;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
  flex-wrap:wrap;
}

.logo{
  font-size:2rem;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:0.5rem;
  cursor:pointer;
  text-decoration:none;
}
.logo svg{width:32px;height:32px;transition:fill 0.2s;fill:#6366f1;}
.logo span{
  font-family:'Sora',sans-serif;
  font-weight:800;
  letter-spacing:0.5px;

  background: linear-gradient(
    90deg,
    var(--accent1) 0%,
    var(--accent1) 25%,
    var(--accent2) 55%,
    var(--accent2) 100%
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  /* 🔥 REMOVE FOG / SOFTNESS */
  text-shadow: none;
  filter: none;
  opacity:1;
}

nav{display:flex;flex-wrap:wrap;gap:1rem;margin-top:0.5rem;}
nav a{color:var(--text);text-decoration:none;font-weight:600;transition:0.3s;}
nav a:hover{color:var(--accent1);}

.search{
  padding:.55rem 1rem;
  border-radius:20px;
  border:1px solid rgba(99,102,241,0.25);
  outline:none;
  margin-top:0.5rem;
  max-width:200px;

  background: linear-gradient(
    135deg,
    rgba(56,189,248,0.15),
    rgba(99,102,241,0.18)
  );

  color:var(--text);
  backdrop-filter: blur(10px);

  box-shadow: 0 0 12px rgba(56,189,248,0.15);

  transition: all 0.25s ease;
}

.search::placeholder{
  color:rgba(241,245,249,0.6);
}

.search:focus{
  border-color: var(--accent1);

  box-shadow:
    0 0 18px rgba(56,189,248,0.35),
    0 0 30px rgba(99,102,241,0.2);

  background: linear-gradient(
    135deg,
    rgba(56,189,248,0.25),
    rgba(99,102,241,0.25)
  );
}

/* SCROLL TO TOP BUTTON — PROFESSIONAL LOOK */
#scrollTop {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(145deg, #38bdf8, #6366f1);
  color: #f1f5f9;
  font-size: 1.6rem;
  cursor: pointer;
  z-index: 999;
  display: none;

  /* Center icon */
  display: flex;
  justify-content: center;
  align-items: center;

  /* Soft shadows for depth */
  box-shadow:
    0 6px 15px rgba(0,0,0,0.25), /* drop shadow */
    inset 0 -2px 6px rgba(255,255,255,0.15); /* inner highlight */

  transition: all 0.25s ease;
}

#scrollTop:hover {
  transform: scale(1.15);
  background: linear-gradient(145deg, #6366f1, #38bdf8);
  box-shadow:
    0 8px 20px rgba(0,0,0,0.35),
    inset 0 -2px 8px rgba(255,255,255,0.25);
}

/* Mobile override — keeps same visual style, slightly smaller */
@media (max-width: 900px) {
  #scrollTop {
    width: 45px;
    height: 45px;
    font-size: 1.4rem;
  }
}

/* Keep rotated arrow */
#scrollTop {
  transform: rotate(-90deg);
}

#scrollTop:hover {
  transform: rotate(-90deg) scale(1.15);
}
/* DASHBOARD */
.dashboard{
  display:flex;
  padding-top: var(--header-height, 6rem); /* fallback to desktop default */
  padding-top: 10rem; /* was 6rem on desktop, increase for mobile header height */
  padding-top: calc(100px + 1rem); /* 100px = approximate mobile header height */
  flex-direction:column;
  gap:1.25rem;
  padding:6rem 1rem 1rem 1rem;
  max-width:1200px;
  margin:auto;
}

/* CARDS */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.2rem;
  backdrop-filter:blur(18px);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 0 20px rgba(99,102,241,0.05);
  width:100%;
  transition:0.35s;
  overflow-x:auto;
}

.card:hover{
  background:var(--glass-strong);
  border-color:var(--accent2);
  box-shadow:
    0 15px 50px rgba(99,102,241,0.35),
    inset 0 0 25px rgba(99,102,241,0.08);
}

/* subtle glow pulse */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  pointer-events:none;
  box-shadow:0 0 0 rgba(99,102,241,0);
  transition:0.4s;
}
.card:hover::after{
  box-shadow:0 0 40px rgba(99,102,241,0.25);
}

.current{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.temp{
  font-size:3.5rem;
  font-weight:800;
  cursor:pointer;
  transition:0.3s;
}
.temp:hover{
  text-shadow:0 0 15px rgba(56,189,248,0.6);
}

/* HOURLY */
.hourly{
  display:flex;
  gap:1rem;
  overflow-x:auto;
  padding-bottom:0.75rem;
}

.hour{
  min-width:90px;
  text-align:center;
  flex-shrink:0;
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  padding:0.5rem;
  transition:0.25s;
  font-size:0.9rem;
}

.hour:hover{
  transform:scale(1.12);
  background:var(--accent-soft);
  box-shadow:0 5px 20px rgba(99,102,241,0.3);
}

/* WEEK */
.week{
  display:flex;
  flex-direction:row;
  gap:1rem;
  overflow-x:auto;
  padding:0.5rem 0;
}

.day{
  flex:0 0 auto;
  width:110px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:0.6rem;
  text-align:center;
  transition:0.25s;
  cursor:pointer;
  border:1px solid rgba(99,102,241,0.15);
}

.day:hover{
  background:var(--accent-soft);
  transform:scale(1.08);
  border-color:var(--accent2);
  box-shadow:0 5px 20px rgba(99,102,241,0.3);
}

.day p{
  margin:0.25rem 0;
  font-size:0.9rem;
}

/* ✅ FIXED: 3 CHARTS IN ONE ROW + BIGGER + READABLE */
.card#charts{
  display:flex;
  flex-direction:column;
}

.card#charts canvas{
  margin-top:0.75rem;
  border-radius:14px;
  background:rgba(10,16,30,0.85);
  padding:0.75rem;
  border:1px solid rgba(99,102,241,0.3);
  flex:1;
  min-width:320px;
  height:260px !important;
}

/* Row layout for all 3 charts */
#charts{
  display:flex;
  flex-direction:column;
}

#charts canvas{
  width:100% !important;
}

/* FORCE ROW LAYOUT */
#charts{
  gap:1rem;
}

#charts > canvas{
  flex:1;
}

/* Wrap canvases into a row */
#charts{
  display:flex;
  flex-wrap:wrap;
}

/* Desktop: single row */
@media(min-width:900px){
  #charts{
    flex-wrap:nowrap;
  }
}

/* Improve readability */
.card#charts canvas{
  font-size:14px;
}
  
/* MAP */
#map{
  height:420px;
  border-radius:18px;
  width:100%;
  max-width:100%;
  border:1px solid rgba(99,102,241,0.25);
  overflow:hidden;
}

/* DETAILS + ALERTS */
#details-content,
#alerts-content{
  background:rgba(255,255,255,0.04);
  padding:1rem;
  border-radius:12px;
  border:1px solid rgba(99,102,241,0.2);
  line-height:1.6;
}

/* ALERTS */
.alert{
  padding:.6rem;
  border-radius:10px;
  margin-bottom:.5rem;
  font-weight:600;
}
.alert-severe{background:var(--alert-severe);color:#000;}
.alert-warning{background:var(--alert-warning);color:#000;}
.alert-info{background:var(--alert-info);color:#000;}

/* MOBILE */
@media(max-width:900px){

  /* HEADER LAYOUT */
  header{
    flex-direction:column;
    align-items:center;
    gap:0.5rem;
  }

  /* LOGO: centered, slightly left */
  .logo{
    display:flex;
    justify-content:center;
    width:100%;
    transform:translateX(-2%);
  }

  /* NAV: single row, full width */
  nav{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    justify-content:space-between;
    width:100%;
    gap:0;
    overflow:hidden;
  }

  nav a{
    flex:1;
    text-align:center;
    font-size:0.75rem;
    padding:0.25rem 0;
    white-space:nowrap;
  }

  /* SEARCH: centered */
  .search{
    display:block;
    margin:0.5rem auto 0 auto;
    width:90%;
    max-width:260px;
    text-align:center;
  }

  /* KEEP EXISTING MOBILE BEHAVIOR */
  .current{
    flex-direction:column;
    align-items:flex-start;
  }

  .temp{
    font-size:2.8rem;
  }

  .card#charts canvas{
    height:280px !important;
  }
}


  
</style>
</head>
<body>
<header>
  <a class="logo" href="#top">
    <svg viewBox="0 0 24 24"><path d="M12 2C10.343 2 9 3.343 9 5s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zm0 16c-2.21 0-4 1.79-4 4h8c0-2.21-1.79-4-4-4z"/></svg>
    <span>SkySight</span>
  </a>
  <nav>
    <a href="#current">Current</a>
    <a href="#hourly-section">Hourly</a>
    <a href="#weekly">Weekly</a>
    <a href="#charts">Charts</a>
    <a href="#map-section">Map</a>
    <a href="#details">Details</a>
    <a href="#alerts">Alerts</a>
  </nav>
  <input id="search" class="search" placeholder="Search city...">
</header>

<button id="scrollTop">&#x25B2;</button>

<div id="top" class="dashboard">
  <div class="card current" id="current">
    <div>
      <div id="location">Las Vegas, NV</div>
      <div id="desc">Loading current...</div>
    </div>
    <div class="temp" id="temp">--°</div>
  </div>

  <div class="card" id="hourly-section">
    <h3>Hourly Forecast</h3>
    <div id="hourly" class="hourly">Loading hourly...</div>
  </div>

  <div class="card" id="weekly">
    <h3>7-Day Forecast</h3>
    <div class="week" id="weekly-forecast">Loading weekly...</div>
  </div>

  <div class="card" id="charts">
    <h3>24h Trends</h3>
    <canvas id="tempChart"></canvas>
    <canvas id="windChart"></canvas>
    <canvas id="precipChart"></canvas>
  </div>

  <div class="card" id="map-section">
    <h3>Interactive Map with Radar</h3>
    <div id="map"></div>
  </div>

  <div class="card" id="details">
    <h3>Details</h3>
    <div id="details-content">Loading details...</div>
  </div>

  <div class="card" id="alerts">
    <h3>Weather Alerts</h3>
    <div id="alerts-content">Loading alerts...</div>
  </div>
</div>

<script>
// === GLOBALS ===
let lat=36.1699, lon=-115.1398, isFahrenheit=true;
const scrollBtn=document.getElementById("scrollTop");

// === SCROLL TOP ===
window.onscroll=()=>scrollBtn.style.display=(window.scrollY>150)?"block":"none";
scrollBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));

// === LOGO FLICKER ===
const logoLink=document.querySelector(".logo"), logoPath=document.querySelector(".logo svg path");
function flicker(){logoPath.setAttribute("fill","#f87171"); setTimeout(()=>logoPath.setAttribute("fill","#6366f1"),200);}
logoLink.addEventListener("mouseenter",flicker);

// === MAP SETUP ===
const map=L.map("map",{minZoom:2,maxZoom:10}).setView([36.1699, -115.1398],4);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ attribution:"© OpenStreetMap" }).addTo(map);

let markers = [];

// Expanded list of major cities (~35)
const locations = [
  { name: "New York, NY", lat: 40.7128, lon: -74.0060 },
  { name: "Los Angeles, CA", lat: 34.0522, lon: -118.2437 },
  { name: "Chicago, IL", lat: 41.8781, lon: -87.6298 },
  { name: "Houston, TX", lat: 29.7604, lon: -95.3698 },
  { name: "Phoenix, AZ", lat: 33.4484, lon: -112.0740 },
  { name: "Philadelphia, PA", lat: 39.9526, lon: -75.1652 },
  { name: "San Antonio, TX", lat: 29.4241, lon: -98.4936 },
  { name: "San Diego, CA", lat: 32.7157, lon: -117.1611 },
  { name: "Dallas, TX", lat: 32.7767, lon: -96.7970 },
  { name: "San Jose, CA", lat: 37.3382, lon: -121.8863 },
  { name: "Austin, TX", lat: 30.2672, lon: -97.7431 },
  { name: "Jacksonville, FL", lat: 30.3322, lon: -81.6557 },
  { name: "Fort Worth, TX", lat: 32.7555, lon: -97.3308 },
  { name: "Columbus, OH", lat: 39.9612, lon: -82.9988 },
  { name: "Charlotte, NC", lat: 35.2271, lon: -80.8431 },
  { name: "San Francisco, CA", lat: 37.7749, lon: -122.4194 },
  { name: "Indianapolis, IN", lat: 39.7684, lon: -86.1581 },
  { name: "Seattle, WA", lat: 47.6062, lon: -122.3321 },
  { name: "Denver, CO", lat: 39.7392, lon: -104.9903 },
  { name: "Washington, DC", lat: 38.9072, lon: -77.0369 },
  { name: "Boston, MA", lat: 42.3601, lon: -71.0589 },
  { name: "El Paso, TX", lat: 31.7619, lon: -106.4850 },
  { name: "Nashville, TN", lat: 36.1627, lon: -86.7816 },
  { name: "Detroit, MI", lat: 42.3314, lon: -83.0458 },
  { name: "Oklahoma City, OK", lat: 35.4676, lon: -97.5164 },
  { name: "Portland, OR", lat: 45.5051, lon: -122.6750 },
  { name: "Las Vegas, NV", lat: 36.1699, lon: -115.1398 },
  { name: "Memphis, TN", lat: 35.1495, lon: -90.0490 },
  { name: "Louisville, KY", lat: 38.2527, lon: -85.7585 },
  { name: "Baltimore, MD", lat: 39.2904, lon: -76.6122 },
  { name: "Milwaukee, WI", lat: 43.0389, lon: -87.9065 },
  { name: "Albuquerque, NM", lat: 35.0844, lon: -106.6504 },
  { name: "Tucson, AZ", lat: 32.2226, lon: -110.9747 },
  { name: "Fresno, CA", lat: 36.7378, lon: -119.7871 },
  { name: "Sacramento, CA", lat: 38.5816, lon: -121.4944 }
];

// Add markers function
function addMarker(lat, lon, popupText, fly=false){
  const m = L.marker([lat, lon]).addTo(map).bindPopup(popupText).openPopup();
  markers.push(m);
  if(fly) map.flyTo([lat, lon],6,{duration:1.2});
  m.on('click', ()=>{
    window.lat = lat;
    window.lon = lon;
    document.getElementById("location").textContent = popupText;
    loadAll();
  });
  return m;
}

// Add all predefined markers
locations.forEach(loc => addMarker(loc.lat, loc.lon, loc.name));

// Radar animations (RainViewer)
let radarLayer;
async function addRadar(){
  try{
    const resp = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const json = await resp.json();
    if(json.radar && json.radar.length>0){
      const radar = json.radar[json.radar.length-1]; // latest radar frame
      if(radarLayer) map.removeLayer(radarLayer);
      radarLayer=L.tileLayer(`https://tilecache.rainviewer.com${radar.path}/{z}/{x}/{y}/2/1_1.png`,{opacity:0.5}).addTo(map);
    }
  }catch(e){console.warn("Radar load failed",e);}
}
addRadar();
setInterval(addRadar,300000);

// === HELPERS ===
function cToF(c){return Math.round((c*9/5)+32);}
function getIcon(code){
  if(code===0)return"☀️";
  if([1,2,3].includes(code))return"⛅";
  if([45,48].includes(code))return"🌫️";
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code))return"🌧️";
  if([71,73,75,77,85,86].includes(code))return"❄️";
  if([95,96,99].includes(code))return"⛈️";
  return"❔";
}

// === FETCH FUNCTIONS ===
async function fetchCurrent(){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
    const data=await res.json();
    const t=isFahrenheit?cToF(data.current_weather.temperature):data.current_weather.temperature;
    document.getElementById("temp").textContent=`${t}°${isFahrenheit?"F":"C"}`;
    document.getElementById("desc").textContent=`Wind ${data.current_weather.windspeed} km/h ${getIcon(data.current_weather.weathercode)}`;
  }catch{document.getElementById("desc").textContent="Failed loading current";}
}

async function fetchHourly(){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode,windspeed_10m,precipitation&timezone=auto`);
    const d=await res.json(), c=document.getElementById("hourly");
    c.innerHTML="";
    d.hourly.time.slice(0,24).forEach((t,i)=>{
      const temp=isFahrenheit?cToF(d.hourly.temperature_2m[i]):d.hourly.temperature_2m[i];
      const wind=d.hourly.windspeed_10m[i], precip=d.hourly.precipitation[i];
      const div=document.createElement("div"); div.className="hour";
      div.innerHTML=`${t.split("T")[1]}<br>${getIcon(d.hourly.weathercode[i])}<br>${temp}°<br>💨${wind} km/h<br>☔${precip} mm`;
      c.appendChild(div);
    });
    renderCharts(d);
  }catch{document.getElementById("hourly").textContent="Hourly load failed";}
}

async function fetchWeekly(){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset&timezone=auto`);
    const d=await res.json(), c=document.getElementById("weekly-forecast"), details=document.getElementById("details-content");
    c.innerHTML="";
    details.innerHTML=""; // clear previous
    for(let i=0;i<7;i++){
      const day=document.createElement("div"); day.className="day";
      day.innerHTML=`<p>${new Date(d.daily.time[i]).toLocaleDateString(undefined,{weekday:'short'})}</p>
                     <p>${getIcon(d.daily.weathercode[i])}</p>
                     <p>${isFahrenheit?cToF(d.daily.temperature_2m_max[i]):d.daily.temperature_2m_max[i]}°/${isFahrenheit?cToF(d.daily.temperature_2m_min[i]):d.daily.temperature_2m_min[i]}°</p>`;
      c.appendChild(day);
    }
    // Populate Details section for the first day as example
    details.innerHTML=`<p>Sunrise: ${new Date(d.daily.sunrise[0]).toLocaleTimeString()}</p>
                       <p>Sunset: ${new Date(d.daily.sunset[0]).toLocaleTimeString()}</p>
                       <p>Max Temp: ${isFahrenheit?cToF(d.daily.temperature_2m_max[0]):d.daily.temperature_2m_max[0]}°</p>
                       <p>Min Temp: ${isFahrenheit?cToF(d.daily.temperature_2m_min[0]):d.daily.temperature_2m_min[0]}°</p>`;
  }catch{document.getElementById("weekly-forecast").textContent="Weekly load failed";}
}

async function fetchAlerts(){
  try{
    // For demo: no actual alerts API, so placeholder
    document.getElementById("alerts-content").textContent="No alerts at this time.";
  }catch{document.getElementById("alerts-content").textContent="Failed loading alerts";}
}

// === CHARTS ===
function renderCharts(d){
  const labels=d.hourly.time.slice(0,24).map(t=>t.split("T")[1]);
  const temps=d.hourly.temperature_2m.slice(0,24).map(t=>isFahrenheit?cToF(t):t);
  const winds=d.hourly.windspeed_10m.slice(0,24);
  const prec=d.hourly.precipitation.slice(0,24);

  if(window.tempC) window.tempC.destroy();
  if(window.windC) window.windC.destroy();
  if(window.precC) window.precC.destroy();

  window.tempC=new Chart(document.getElementById("tempChart").getContext("2d"),{
    type:"line",
    data:{labels,datasets:[{label:"Temperature (°"+(isFahrenheit?"F":"C")+")",data:temps,borderColor:"#38bdf8",backgroundColor:"rgba(56,189,248,0.2)",tension:0.4,fill:true,pointRadius:3,pointHoverRadius:6}]},
    options:{responsive:true,plugins:{title:{display:true,text:"Temperature Over 24h"},tooltip:{mode:"index",intersect:false}},scales:{y:{beginAtZero:false}}}
  });

  window.windC=new Chart(document.getElementById("windChart").getContext("2d"),{
    type:"line",
    data:{labels,datasets:[{label:"Wind Speed (km/h)",data:winds,borderColor:"#facc15",backgroundColor:"rgba(250,204,21,0.2)",tension:0.4,fill:true,pointRadius:3,pointHoverRadius:6}]},
    options:{responsive:true,plugins:{title:{display:true,text:"Wind Speed Over 24h"},tooltip:{mode:"index",intersect:false}},scales:{y:{beginAtZero:true}}}
  });

  window.precC=new Chart(document.getElementById("precipChart").getContext("2d"),{
    type:"bar",
    data:{labels,datasets:[{label:"Precipitation (mm)",data:prec,backgroundColor:"rgba(56,189,248,0.4)",borderColor:"#38bdf8",borderWidth:1}]},
    options:{responsive:true,plugins:{title:{display:true,text:"Precipitation Over 24h"}},scales:{y:{beginAtZero:true}}}
  });
}

// === MAIN ===
async function loadAll(){await fetchCurrent(); await fetchHourly(); await fetchWeekly(); await fetchAlerts();}
loadAll();

document.getElementById("search").addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    const city=e.target.value; alert(`Searching for: ${city}`); // placeholder
  }
});
function updateDashboardPadding() {
  const header = document.querySelector('header');
  const dashboard = document.querySelector('.dashboard');
  const headerHeight = header.offsetHeight; // real height
  dashboard.style.paddingTop = headerHeight + 'px';
}

// run on load and on resize
window.addEventListener('load', updateDashboardPadding);
window.addEventListener('resize', updateDashboardPadding);
  
</script>
