<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySight | Ultimate Weather Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  /* 🔥 UPGRADED COLOR SYSTEM */
  --bg-dark: linear-gradient(135deg,#060f1f,#0b1d33,#172554,#1e3a8a);
  --glass: rgba(255,255,255,0.06);
  --glass-strong: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.18);
  --accent1:#38bdf8;
  --accent2:#6366f1;
  --accentGlow:rgba(56,189,248,0.25);
  --text:#e6edf7;

  --alert-severe:#f87171;
  --alert-warning:#facc15;
  --alert-info:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-dark);
  color:var(--text);
  scroll-behavior:smooth;
  min-height:100vh;
}

/* HEADER (UNCHANGED INTENTIONALLY) */
header{
  background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 2rem; position:fixed; top:0; left:0; width:100%; z-index:999;
  flex-wrap:wrap;
}

.logo{
  font-size:2rem; font-weight:900;
  display:flex; align-items:center; gap:0.5rem; cursor:pointer; text-decoration:none;
}
.logo svg{width:32px; height:32px; transition:fill 0.2s; fill:#6366f1;}
.logo span{
  background: linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

nav{display:flex; flex-wrap:wrap; gap:1rem; margin-top:0.5rem;}
nav a{color:var(--text); text-decoration:none; font-weight:600; transition:0.3s;}
nav a:hover{color:var(--accent1);}

.search{padding:.5rem 1rem; border-radius:20px; border:none; outline:none; margin-top:0.5rem; max-width:200px;}

#scrollTop{
  position:fixed; bottom:20px; right:20px;
  background:var(--accent1); color:#fff; border:none;
  padding:0.5rem 0.8rem; border-radius:50%; font-size:1.3rem; cursor:pointer;
  display:none; z-index:999;
}

/* 🔥 DASHBOARD DEPTH */
.dashboard{
  display:flex;
  flex-direction:column;
  gap:1.2rem;
  padding:6rem 1rem 1rem 1rem;
  max-width:1200px;
  margin:auto;
}

/* 🔥 ENHANCED CARD SYSTEM */
.card{
  background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border);
  border-radius:16px;
  padding:1rem;
  backdrop-filter:blur(14px);
  width:100%;
  transition:0.3s;
  opacity:1;
  transform:translateY(0);
  overflow-x:auto;
  -webkit-overflow-scrolling: touch;

  box-shadow:
    0 8px 30px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* subtle hover polish */
.card:hover{
  box-shadow:
    0 12px 40px rgba(0,0,0,0.45),
    0 0 20px var(--accentGlow);
}

.current{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
.temp{font-size:3rem; font-weight:700; cursor:pointer;}

.hourly{display:flex; gap:1rem; overflow-x:auto; padding-bottom:0.5rem;}
.hour{
  min-width:80px;
  text-align:center;
  transition:0.25s;
  flex-shrink:0;
  background:rgba(255,255,255,0.03);
  border-radius:10px;
  padding:0.4rem;
}
.hour:hover{
  transform:scale(1.1);
  background:rgba(56,189,248,0.15);
}

.week{display:flex; flex-direction:row; gap:1rem; overflow-x:auto; padding:0.5rem 0;}

.day{
  flex:0 0 auto;
  width:100px;
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  padding:0.5rem;
  text-align:center;
  transition:0.25s;
  cursor:pointer;
}
.day:hover{
  background:rgba(56,189,248,0.25);
  transform:scale(1.05);
}

.day p{margin:0.2rem 0; font-size:0.85rem;}

/* 🔥 CHART UPGRADE */
.card#charts canvas{
  margin-top:1rem;
  border-radius:12px;
  background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  padding:0.5rem;
  height:300px !important;
  max-width:100%;
}

/* 🔥 MAP CONTAINER */
#map{
  height:400px;
  border-radius:16px;
  width:100%;
  max-width:100%;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.1);
}

/* ALERTS */
.alert{padding:.5rem; border-radius:8rem; margin-bottom:.5rem; transition:0.2s;}
.alert-severe{background:var(--alert-severe);color:#000;}
.alert-warning{background:var(--alert-warning);color:#000;}
.alert-info{background:var(--alert-info);color:#000;}
.alert:hover{opacity:0.9;}

@media(max-width:900px){
  header{flex-direction:column; align-items:center;}
  .search{width:100%; max-width:250px;}
  .current{flex-direction:column; align-items:flex-start;}
  .temp{font-size:2.5rem;}
  .card#charts canvas{height:250px !important;}
}
</style>
</head>
