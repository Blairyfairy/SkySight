  --glass: rgba(15,23,42,0.65);

<body>

<!-- === YOUR ENTIRE ORIGINAL HTML UNCHANGED === -->

<script>
// === GLOBALS ===
let lat=36.1699, lon=-115.1398, isFahrenheit=true;
const scrollBtn=document.getElementById("scrollTop");

// === (ALL YOUR ORIGINAL JS REMAINS EXACTLY THE SAME ABOVE) ===


// =========================
// ✅ ADDED SEARCH FIX (ONLY ADDITION)
// =========================
async function geocodeCity(city){
  try{
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
    const data = await res.json();
    if(data.results && data.results.length > 0){
      return data.results[0];
    }
  }catch(e){console.warn("Geocode failed", e);}
  return null;
}

// =========================
// ✅ REPLACED ONLY FUNCTION BODY (kept event exactly same)
// =========================
document.getElementById("search").addEventListener("keypress",async e=>{
  if(e.key==="Enter"){
    const city=e.target.value;

    const result = await geocodeCity(city);

    if(result){
      lat = result.latitude;
      lon = result.longitude;

      document.getElementById("location").textContent =
        `${result.name}, ${result.country}`;

      // Add marker + fly safely
      addMarker(lat, lon, `${result.name}`, true);

      loadAll();
    }else{
      alert("Location not found");
    }
  }
});

</script>
</body>
