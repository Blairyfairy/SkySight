<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySight | Ultimate Weather Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: linear-gradient(135deg,#0b1d33,#1e2a47,#2f3b5c);
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.2);
  --accent1:#38bdf8;
  --accent2:#6366f1;
  --text:#f1f5f9;
  --alert-severe:#f87171;
  --alert-warning:#facc15;
  --alert-info:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);scroll-behavior:smooth;min-height:100vh;}

header{
  background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 2rem; position:fixed; top:0; left:0; width:100%; z-index:999;
  flex-wrap:wrap;
}

.logo{
  font-size:2rem; font-weight:900;
  display:flex; align-items:center; gap:0.5rem; cursor:pointer; text-decoration:none;
}
.logo svg{width:32px; height:32px; transition:fill 0.2s; fill:#6366f1;}
.logo span{
  background: linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

nav{display:flex; flex-wrap:wrap; gap:1rem; margin-top:0.5rem;}
nav a{color:var(--text); text-decoration:none; font-weight:600; transition:0.3s;}
nav a:hover{color:var(--accent1);}

.search{padding:.5rem 1rem; border-radius:20px; border:none; outline:none; margin-top:0.5rem; max-width:200px;}

#scrollTop{
  position:fixed; bottom:20px; right:20px;
  background:var(--accent1); color:#fff; border:none;
  padding:0.5rem 0.8rem; border-radius:50%; font-size:1.3rem; cursor:pointer;
  display:none; z-index:999;
}

.dashboard{display:flex; flex-direction:column; gap:1rem; padding:6rem 1rem 1rem 1rem; max-width:1200px; margin:auto;}

.card{
  background:var(--glass); border:1px solid var(--border); border-radius:16px; padding:1rem;
  backdrop-filter:blur(12px); width:100%; transition:0.3s; opacity:1; transform:translateY(0);
  overflow-x:auto; -webkit-overflow-scrolling: touch;
}

.current{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
.temp{font-size:3rem; font-weight:700; cursor:pointer;}

.hourly{display:flex; gap:1rem; overflow-x:auto; padding-bottom:0.5rem; -webkit-overflow-scrolling: touch;}
.hour{min-width:80px; text-align:center; transition:0.2s; flex-shrink:0;}
.hour:hover{transform:scale(1.1);}

.week{display:flex; flex-direction:row; gap:1rem; overflow-x:auto; padding:0.5rem 0;}
.day{
  flex:0 0 auto; width:100px; background:rgba(255,255,255,0.05); border-radius:12px;
  padding:0.5rem; text-align:center; transition:0.2s; cursor:pointer;
}
.day:hover{background:rgba(56,189,248,0.2); transform:scale(1.05);}
.day p{margin:0.2rem 0; font-size:0.85rem;}

canvas{width:100% !important; height:200px !important; touch-action: pan-x pan-y;}

/* 24h Trends Enhancements */
.card#charts canvas{
  margin-top:1rem; border-radius:12px; background:rgba(255,255,255,0.05);
  padding:0.5rem;
}
.card#charts h3{margin-bottom:0.5rem;}
.chart-label{font-size:0.85rem; color:#f1f5f9; margin-top:0.2rem; text-align:center;}

#map{height:400px; border-radius:16px; width:100%; max-width:100%;}

.alert{padding:.5rem; border-radius:8rem; margin-bottom:.5rem; transition:0.2s; word-break:break-word;}
.alert-severe{background:var(--alert-severe);color:#000;}
.alert-warning{background:var(--alert-warning);color:#000;}
.alert-info{background:var(--alert-info);color:#000;}
.alert:hover{opacity:0.9;}

@media(max-width:900px){
  header{flex-direction:column; align-items:center;}
  .search{width:100%; max-width:250px;}
  .current{flex-direction:column; align-items:flex-start;}
  .temp{font-size:2.5rem;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="#top">
    <svg viewBox="0 0 24 24"><path d="M12 2C10.343 2 9 3.343 9 5s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zm0 16c-2.21 0-4 1.79-4 4h8c0-2.21-1.79-4-4-4z"/></svg>
    <span>SkySight</span>
  </a>
  <nav>
    <a href="#current">Current</a>
    <a href="#hourly-section">Hourly</a>
    <a href="#weekly">Weekly</a>
    <a href="#charts">Charts</a>
    <a href="#map-section">Map</a>
    <a href="#details">Details</a>
    <a href="#alerts">Alerts</a>
  </nav>
  <input id="search" class="search" placeholder="Search city...">
</header>

<button id="scrollTop">&#8679;</button>

<div id="top" class="dashboard">
  <div class="card current" id="current">
    <div>
      <div id="location">Las Vegas, NV</div>
      <div id="desc">Loading current...</div>
    </div>
    <div class="temp" id="temp">--°</div>
  </div>

  <div class="card" id="hourly-section">
    <h3>Hourly Forecast</h3>
    <div id="hourly" class="hourly">Loading hourly...</div>
  </div>

  <div class="card" id="weekly">
    <h3>7-Day Forecast</h3>
    <div class="week" id="weekly-forecast">Loading weekly...</div>
  </div>

  <div class="card" id="charts">
    <h3>24h Trends</h3>
    <canvas id="tempChart"></canvas>
    <canvas id="windChart"></canvas>
    <canvas id="precipChart"></canvas>
  </div>

  <div class="card" id="map-section">
    <h3>Interactive Map with Radar</h3>
    <div id="map"></div>
  </div>

  <div class="card" id="details">
    <h3>Details</h3>
    <div id="details-content">Loading details...</div>
  </div>

  <div class="card" id="alerts">
    <h3>Weather Alerts</h3>
    <div id="alerts-content">Loading alerts...</div>
  </div>
</div>

<script>
// === GLOBALS ===
let lat=36.1699, lon=-115.1398, isFahrenheit=true;
const scrollBtn=document.getElementById("scrollTop");

// === SCROLL TOP ===
window.onscroll=()=>scrollBtn.style.display=(window.scrollY>150)?"block":"none";
scrollBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));

// === LOGO FLICKER ===
const logoLink=document.querySelector(".logo"), logoPath=document.querySelector(".logo svg path");
function flicker(){logoPath.setAttribute("fill","#f87171"); setTimeout(()=>logoPath.setAttribute("fill","#6366f1"),200);}
logoLink.addEventListener("mouseenter",flicker);

// === MAP SETUP ===
const map=L.map("map").setView([lat,lon],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ attribution:"© OpenStreetMap" }).addTo(map);

let markers = [];

// Predefined locations
const locations = [
  { name: "Las Vegas, NV", lat: 36.1699, lon: -115.1398 },
  { name: "New York, NY", lat: 40.7128, lon: -74.0060 },
  { name: "Chicago, IL", lat: 41.8781, lon: -87.6298 },
  { name: "San Francisco, CA", lat: 37.7749, lon: -122.4194 },
  { name: "Miami, FL", lat: 25.7617, lon: -80.1918 },
];

// Add markers function
function addMarker(lat, lon, popupText, fly=false){
  const m = L.marker([lat, lon]).addTo(map).bindPopup(popupText).openPopup();
  markers.push(m);
  if(fly) map.flyTo([lat, lon],6,{duration:1.2});
  // Clicking a marker updates dashboard
  m.on('click', ()=>{
    window.lat = lat;
    window.lon = lon;
    document.getElementById("location").textContent = popupText;
    loadAll();
  });
  return m;
}

// Add all predefined markers
locations.forEach(loc => addMarker(loc.lat, loc.lon, loc.name));

// Radar animations (RainViewer)
let radarLayer;
function addRadar(){
  const now=Math.floor(Date.now()/1000/300)*300;
  if(radarLayer) map.removeLayer(radarLayer);
  radarLayer=L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/256/{z}/{x}/{y}/${now}/0_1.png`,{opacity:0.5}).addTo(map);
}
addRadar(); setInterval(addRadar,300000);

// === HELPERS ===
function cToF(c){return Math.round((c*9/5)+32);}
function getIcon(code){
  if(code===0)return"☀️";
  if([1,2,3].includes(code))return"⛅";
  if([45,48].includes(code))return"🌫️";
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code))return"🌧️";
  if([71,73,75,77,85,86].includes(code))return"❄️";
  if([95,96,99].includes(code))return"⛈️";
  return"❔";
}

// === FETCH FUNCTIONS ===
async function fetchCurrent(){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
    const data=await res.json();
    const t=isFahrenheit?cToF(data.current_weather.temperature):data.current_weather.temperature;
    document.getElementById("temp").textContent=`${t}°${isFahrenheit?"F":"C"}`;
    document.getElementById("desc").textContent=`Wind ${data.current_weather.windspeed} km/h ${getIcon(data.current_weather.weathercode)}`;
  }catch{document.getElementById("desc").textContent="Failed loading current";}
}

async function fetchHourly(){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode,windspeed_10m,precipitation&timezone=auto`);
    const d=await res.json(), c=document.getElementById("hourly");
    c.innerHTML="";
    d.hourly.time.slice(0,24).forEach((t,i)=>{
      const temp=isFahrenheit?cToF(d.hourly.temperature_2m[i]):d.hourly.temperature_2m[i];
      const wind=d.hourly.windspeed_10m[i], precip=d.hourly.precipitation[i];
      const div=document.createElement("div"); div.className="hour";
      div.innerHTML=`${t.split("T")[1]}<br>${getIcon(d.hourly.weathercode[i])}<br>${temp}°<br>💨${wind} km/h<br>☔${precip} mm`;
      c.appendChild(div);
    });
    renderCharts(d);
  }catch{document.getElementById("hourly").textContent="Hourly load failed";}
}

async function fetchWeekly(){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset&timezone=auto`);
    const d=await res.json(), c=document.getElementById("weekly-forecast");
    c.innerHTML="";
    d.daily.time.forEach((day,i)=>{
      const max=isFahrenheit?cToF(d.daily.temperature_2m_max[i]):d.daily.temperature_2m_max[i];
      const min=isFahrenheit?cToF(d.daily.temperature_2m_min[i]):d.daily.temperature_2m_min[i];
      const div=document.createElement("div"); div.className="day";
      div.innerHTML=`<p>${day}</p><p>${getIcon(d.daily.weathercode[i])}</p><p>${max}° / ${min}°</p>`;
      c.appendChild(div);
    });
    document.getElementById("details-content").innerHTML=`<p>Sunrise: ${d.daily.sunrise[0]}</p><p>Sunset: ${d.daily.sunset[0]}</p>`;
  }catch{document.getElementById("weekly-forecast").textContent="Weekly load failed";}
}

async function fetchAlerts(){
  try{
    const res=await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
    const d=await res.json(), c=document.getElementById("alerts-content");
    c.innerHTML="";
    if(!d.features||!d.features.length) c.textContent="No active alerts.";
    else d.features.forEach(a=>{
      const sev=a.properties.severity.toLowerCase();
      const cls=sev.includes("severe")?"alert-severe":sev.includes("warning")?"alert-warning":"alert-info";
      const div=document.createElement("div"); div.className="alert "+cls;
      div.innerHTML=`${a.properties.event} (${a.properties.severity})<br>${a.properties.headline}`;
      c.appendChild(div);
    });
  }catch{document.getElementById("alerts-content").textContent="Alerts load failed";}
}

// === CHARTS ===
function renderCharts(d){
  const labels=d.hourly.time.slice(0,24).map(t=>t.split("T")[1]);
  const temps=d.hourly.temperature_2m.slice(0,24).map(t=>(isFahrenheit?cToF(t):t));
  const winds=d.hourly.windspeed_10m.slice(0,24); const prec=d.hourly.precipitation.slice(0,24);
  if(window.tempC) window.tempC.destroy();
  if(window.windC) window.windC.destroy();
  if(window.precC) window.precC.destroy();

  window.tempC=new Chart(document.getElementById("tempChart").getContext("2d"),{
    type:"line",
    data:{labels,datasets:[{label:"Temperature (°"+(isFahrenheit?"F":"C")+")",data:temps,borderColor:"#38bdf8",backgroundColor:"rgba(56,189,248,0.2)",tension:0.4,fill:true,pointRadius:3,pointHoverRadius:6}]} ,
    options:{responsive:true,plugins:{title:{display:true,text:"Temperature Over 24h"},tooltip:{mode:"index",intersect:false}},scales:{y:{beginAtZero:false}}}
  });

  window.windC=new Chart(document.getElementById("windChart").getContext("2d"),{
    type:"line",
    data:{labels,datasets:[{label:"Wind Speed (km/h)",data:winds,borderColor:"#facc15",backgroundColor:"rgba(250,204,21,0.2)",tension:0.4,fill:true,pointRadius:3,pointHoverRadius:6}]} ,
    options:{responsive:true,plugins:{title:{display:true,text:"Wind Speed Over 24h"},tooltip:{mode:"index",intersect:false}},scales:{y:{beginAtZero:true}}}
  });

  window.precC=new Chart(document.getElementById("precipChart").getContext("2d"),{
    type:"bar",
    data:{labels,datasets:[{label:"Precipitation (mm)",data:prec,backgroundColor:"rgba(248,113,113,0.6)"}]},
    options:{responsive:true,plugins:{title:{display:true,text:"Precipitation Over 24h"},tooltip:{mode:"index",intersect:false}},scales:{y:{beginAtZero:true}}}
  });
}

// === SEARCH ===
document.getElementById("search").addEventListener("keypress",async e=>{
  if(e.key==="Enter"){
    const city=e.target.value; if(!city) return;
    try{
      const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=5`);
      const r=await geo.json();
      if(r.results && r.results.length>0){
        lat = r.results[0].latitude;
        lon = r.results[0].longitude;
        document.getElementById("location").textContent = r.results[0].name;
        addMarker(lat, lon, r.results[0].name, true);
        loadAll();
      } else alert("City not found");
    }catch{alert("Geocode failed");}
  }
});

// === TEMP TOGGLE ===
document.getElementById("temp").addEventListener("click",()=>{isFahrenheit=!isFahrenheit; loadAll();});

// === LOAD ALL ===
function loadAll(){fetchCurrent(); fetchHourly(); fetchWeekly(); fetchAlerts();}
loadAll();
setInterval(loadAll,600000);

// Map click to add marker
map.on('click', e=>{
  lat = e.latlng.lat;
  lon = e.latlng.lng;
  addMarker(lat, lon, `Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`, true);
  document.getElementById("location").textContent=`Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`;
  loadAll();
});
</script>
</body>
</html>
