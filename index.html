<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySight | Ultimate Weather Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: linear-gradient(135deg,#0f172a,#1e293b,#334155);
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.15);
  --accent1:#6366f1;
  --accent2:#38bdf8;
  --text:#e2e8f0;
  --alert-severe:#f87171;
  --alert-warning:#facc15;
  --alert-info:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);}

header{
  background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);
  display:flex;justify-content:space-between;align-items:center;
  padding:1rem 2rem;position:fixed;width:100%;z-index:999;flex-wrap:wrap;
}

.logo{font-size:2rem;font-weight:900;display:flex;gap:.5rem;text-decoration:none;}
.logo span{
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

nav{display:flex;gap:1rem;flex-wrap:wrap;}
nav a{color:var(--text);text-decoration:none;font-weight:600;padding:.3rem .6rem;border-radius:10px;}
nav a:hover{background:rgba(255,255,255,0.08);color:var(--accent2);}

.dashboard{padding:6rem 1rem;max-width:1200px;margin:auto;display:flex;flex-direction:column;gap:1rem;}

.card{
  background:var(--glass);border:1px solid var(--border);border-radius:16px;
  padding:1rem;backdrop-filter:blur(14px);
}

.hourly{display:flex;gap:1rem;overflow-x:auto;}
.week{display:flex;gap:1rem;overflow-x:auto;}
.day{width:100px;text-align:center;background:rgba(255,255,255,0.05);border-radius:12px;padding:.5rem;}

#map{height:400px;border-radius:16px;}

.alert{padding:.5rem;border-radius:8rem;margin-bottom:.5rem;}
.alert-info{background:var(--alert-info);color:#000;}

canvas{background:rgba(255,255,255,0.05);border-radius:12px;margin-top:1rem;}
</style>
</head>

<body>

<header>
  <a class="logo"><span>SkySight</span></a>
  <nav>
    <a href="#current">Current</a>
    <a href="#hourly">Hourly</a>
    <a href="#weekly">Weekly</a>
    <a href="#charts">Charts</a>
    <a href="#map">Map</a>
  </nav>
</header>

<div class="dashboard">

<div class="card" id="current">
<h3>Current</h3>
<div id="temp">--°</div>
<div id="desc"></div>
</div>

<div class="card">
<h3>Hourly</h3>
<div id="hourly" class="hourly"></div>
</div>

<div class="card">
<h3>Weekly</h3>
<div id="weekly" class="week"></div>
</div>

<div class="card" id="charts">
<h3>Charts</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="card">
<h3>Map</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>Details</h3>
<div id="details"></div>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

<script>
let lat=36.1699, lon=-115.1398;

function cToF(c){return Math.round((c*9/5)+32);}

/* CURRENT */
async function current(){
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const d=await r.json();
document.getElementById("temp").innerText=cToF(d.current_weather.temperature)+"°F";
document.getElementById("desc").innerText="Wind "+d.current_weather.windspeed;
}

/* HOURLY */
async function hourly(){
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m`);
const d=await r.json();
let c=document.getElementById("hourly");c.innerHTML="";
d.hourly.temperature_2m.slice(0,12).forEach(t=>{
let div=document.createElement("div");
div.innerText=cToF(t)+"°";
c.appendChild(div);
});
}

/* WEEKLY + DETAILS */
async function weekly(){
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset`);
const d=await r.json();

let w=document.getElementById("weekly");w.innerHTML="";
for(let i=0;i<7;i++){
let div=document.createElement("div");
div.className="day";
div.innerHTML=`${cToF(d.daily.temperature_2m_max[i])}°`;
w.appendChild(div);
}

document.getElementById("details").innerHTML=
`Sunrise: ${new Date(d.daily.sunrise[0]).toLocaleTimeString()}<br>
 Sunset: ${new Date(d.daily.sunset[0]).toLocaleTimeString()}`;
}

/* ALERTS */
function alerts(){
document.getElementById("alerts").innerHTML=
`<div class="alert alert-info">No active weather warnings</div>`;
}

/* CHART */
async function chart(){
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m`);
const d=await r.json();
new Chart(document.getElementById("tempChart"),{
type:"line",
data:{
labels:d.hourly.time.slice(0,12),
datasets:[{data:d.hourly.temperature_2m.slice(0,12)}]
}
});
}

/* MAP */
const map=L.map("map").setView([lat,lon],4);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
L.marker([lat,lon]).addTo(map);

/* LOAD */
function load(){
current();
hourly();
weekly();
alerts();
chart();
}
load();
</script>

</body>
</html>
