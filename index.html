<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySight | Ultimate Weather Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-velocity/2.0.0/leaflet-velocity.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: linear-gradient(135deg,#0b1d33,#1e2a47,#2f3b5c);
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.2);
  --accent1:#38bdf8;
  --accent2:#6366f1;
  --text:#f1f5f9;
  --alert-severe:#f87171;
  --alert-warning:#facc15;
  --alert-info:#38bdf8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);scroll-behavior:smooth;min-height:100vh;}

header{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:flex; justify-content:space-between; align-items:center;padding:1rem 2rem; position:fixed; top:0; left:0; width:100%; z-index:999;flex-wrap:wrap;}

.logo{font-size:2rem; font-weight:900;display:flex; align-items:center; gap:0.5rem; cursor:pointer; text-decoration:none;}
.logo svg{width:32px; height:32px; transition:fill 0.2s; fill:#6366f1;}
.logo span{background: linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text; -webkit-text-fill-color:transparent;}

nav{display:flex; flex-wrap:wrap; gap:1rem; margin-top:0.5rem;}
nav a{color:var(--text); text-decoration:none; font-weight:600; transition:0.3s;}nav a:hover{color:var(--accent1);}

.search{padding:.5rem 1rem; border-radius:20px; border:none; outline:none; margin-top:0.5rem; max-width:200px;}

#scrollTop{position:fixed; bottom:20px; right:20px;background:var(--accent1); color:#fff; border:none;padding:0.5rem 0.8rem; border-radius:50%; font-size:1.3rem; cursor:pointer;display:none; z-index:999;}

.dashboard{display:flex; flex-direction:column; gap:1rem; padding:6rem 1rem 1rem 1rem; max-width:1200px; margin:auto;}

.card{background:var(--glass); border:1px solid var(--border); border-radius:16px; padding:1rem; backdrop-filter:blur(12px); width:100%; transition:0.3s; opacity:1; transform:translateY(0); overflow-x:auto; -webkit-overflow-scrolling: touch;}

.current{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
.temp{font-size:3rem; font-weight:700; cursor:pointer;}

.hourly{display:flex; gap:1rem; overflow-x:auto; padding-bottom:0.5rem; -webkit-overflow-scrolling: touch;}
.hour{min-width:80px; text-align:center; transition:0.2s; flex-shrink:0;}
.hour:hover{transform:scale(1.1);}

.week{display:flex; flex-direction:column; gap:.5rem;}
.day{display:flex; justify-content:space-between; align-items:center; transition:0.2s;}
.day:hover{background:rgba(255,255,255,0.05);border-radius:8px;padding:0.2rem;}

canvas{width:100% !important; height:200px !important; touch-action: pan-x pan-y;}
#map{height:400px; border-radius:16px; width:100%; max-width:100%;}

.alert{padding:.5rem; border-radius:8px; margin-bottom:.5rem; transition:0.2s; word-break:break-word;}
.alert-severe{background:var(--alert-severe);color:#000;}
.alert-warning{background:var(--alert-warning);color:#000;}
.alert-info{background:var(--alert-info);color:#000;}
.alert:hover{opacity:0.9;}

@media(max-width:900px){
  header{flex-direction:column; align-items:center;}
  .search{width:100%; max-width:250px;}
  .current{flex-direction:column; align-items:flex-start;}
  .temp{font-size:2.5rem;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="#top">
    <svg viewBox="0 0 24 24"><path d="M12 2C10.343 2 9 3.343 9 5s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zm0 16c-2.21 0-4 1.79-4 4h8c0-2.21-1.79-4-4-4z"/></svg>
    <span>SkySight</span>
  </a>
  <nav>
    <a href="#current">Current</a><a href="#hourly-section">Hourly</a><a href="#weekly">Weekly</a><a href="#charts">Charts</a><a href="#map-section">Map</a><a href="#details">Details</a><a href="#alerts">Alerts</a>
  </nav>
  <input id="search" class="search" placeholder="Search city...">
</header>

<button id="scrollTop">&#8679;</button>

<div id="top" class="dashboard">
  <div class="card current" id="current"><div><div id="location">Las Vegas, NV</div><div id="desc">Loading current...</div></div><div class="temp" id="temp">--°</div></div>
  <div class="card" id="hourly-section"><h3>Hourly Forecast</h3><div id="hourly" class="hourly">Loading hourly...</div></div>
  <div class="card" id="weekly"><h3>7-Day Forecast</h3><div class="week" id="weekly-forecast">Loading weekly...</div></div>
  <div class="card" id="charts"><h3>24h Trends</h3><canvas id="tempChart"></canvas><canvas id="windChart"></canvas><canvas id="precipChart"></canvas></div>
  <div class="card" id="map-section"><h3>Interactive Map with Radar</h3><div id="map"></div></div>
  <div class="card" id="details"><h3>Details</h3><div id="details-content">Loading details...</div></div>
  <div class="card" id="alerts"><h3>Weather Alerts</h3><div id="alerts-content">Loading alerts...</div></div>
</div>

<script>
// === GLOBALS ===
let lat=36.1699, lon=-115.1398, isFahrenheit=true;
const scrollBtn=document.getElementById("scrollTop");
let airportData=[];

// --- Top ~200 Cities ---
let cityData=[
  {name:"Tokyo",country:"Japan",lat:35.6895,lon:139.6917,pop:37400068},
  {name:"Delhi",country:"India",lat:28.7041,lon:77.1025,pop:28514000},
  {name:"Shanghai",country:"China",lat:31.2304,lon:121.4737,pop:25582000},
  {name:"São Paulo",country:"Brazil",lat:-23.5505,lon:-46.6333,pop:21650000},
  {name:"Mexico City",country:"Mexico",lat:19.4326,lon:-99.1332,pop:21581000},
  {name:"Cairo",country:"Egypt",lat:30.0444,lon:31.2357,pop:20076000},
  {name:"Mumbai",country:"India",lat:19.0760,lon:72.8777,pop:19980000},
  {name:"Beijing",country:"China",lat:39.9042,lon:116.4074,pop:19618000},
  {name:"Dhaka",country:"Bangladesh",lat:23.8103,lon:90.4125,pop:19578000},
  {name:"Osaka",country:"Japan",lat:34.6937,lon:135.5023,pop:19281000},
  // ... continue to 200 cities ...
];

// --- SCROLL TOP ---
window.onscroll=()=>scrollBtn.style.display=(window.scrollY>150)?"block":"none";
scrollBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));

// --- MAP ---
const map=L.map("map").setView([lat,lon],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ attribution:"© OpenStreetMap" }).addTo(map);
const mainMarker=L.marker([lat,lon]).addTo(map);

// Radar overlay
function updateRadar(){
  const now=Math.floor(Date.now()/1000/300)*300;
  if(window.radarLayer) map.removeLayer(window.radarLayer);
  window.radarLayer=L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/256/{z}/{x}/{y}/${now}/0_1.png`,{opacity:0.5}).addTo(map);
}
updateRadar(); setInterval(updateRadar,300000);

// --- Airports ---
fetch("https://cdn.jsdelivr.net/npm/iata-airports/active_airports.json")
  .then(r=>r.json())
  .then(d=>{ airportData=d; placeAirportMarkers(); placeCityMarkers(); })
  .catch(()=>console.log("Airport list failed"));

function placeAirportMarkers(){
  airportData.forEach(a=>{
    if(!a.latitude||!a.longitude) return;
    L.circleMarker([a.latitude,a.longitude],{radius:4,color:"#ffdd00",weight:1,fillOpacity:0.8})
      .bindPopup(`${a.name} (${a.iata})`).addTo(map);
  });
}

function placeCityMarkers(){
  cityData.forEach(c=>{
    L.circleMarker([c.lat,c.lon],{radius:3,color:"#38bdf8",weight:1,fillOpacity:0.8})
      .bindPopup(`${c.name}, ${c.country} — Pop: ${c.pop.toLocaleString()}`)
      .addTo(map);
  });
}

// --- Closest airport ---
function findClosestAirport(lat0,lon0){
  let best=null,bestDist=Infinity;
  airportData.forEach(a=>{
    if(!a.latitude||!a.longitude) return;
    const d=(lat0-a.latitude)**2+(lon0-a.longitude)**2;
    if(d<bestDist){bestDist=d; best=a;}
  });
  return best;
}

function gotoClosestAirport(lat0,lon0){
  const airport=findClosestAirport(lat0,lon0);
  if(airport){
    map.setView([airport.latitude,airport.longitude],8);
    mainMarker.setLatLng([airport.latitude,airport.longitude]);
    document.getElementById("location").textContent=`${airport.name} (${airport.iata})`;
  }
}

// --- SEARCH ---
document.getElementById("search").addEventListener("keypress",async e=>{
  if(e.key==="Enter"){
    const city=e.target.value;
    const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
    const g=await geo.json();
    if(g.results){lat=g.results[0].latitude; lon=g.results[0].longitude;
      gotoClosestAirport(lat,lon);
      loadAll();
    } else {alert("City not found");}
  }
});

// --- TEMP TOGGLE ---
document.getElementById("temp").addEventListener("click",()=>{isFahrenheit=!isFahrenheit; loadAll();});

// --- LOAD ALL ---
function loadAll(){
  fetchCurrent(); fetchHourly(); fetchWeekly(); fetchAlerts();
}

// --- All your existing weather, hourly, weekly, alert, chart code remains unchanged ---

loadAll();
setInterval(loadAll,600000);
</script>
</body>
</html>
